<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MoravaSoft – Custom Software Development</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --blue: #7bbde8;
            --blue-dim: rgba(123, 189, 232, 0.15);
            --gold: #c8a96e;
            --dark: #111827;
            --dark2: #1a2330;
            --dark3: #1f2d3d;
            --dark4: #263548;
            --text: #e8edf4;
            --muted: #9aa6b2;
            --border: rgba(123, 189, 232, 0.15);
            --border-gold: rgba(200, 169, 110, 0.25);
            --heading-font: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', Arial, sans-serif;
            --body-font: 'DM Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        }

        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: var(--body-font);
            background: var(--dark);
            color: var(--text);
            line-height: 1.7;
            overflow-x: hidden;
        }

        /* NAV */
        nav {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 1rem 4rem;
            background: rgba(13, 17, 23, 0.9);
            backdrop-filter: blur(16px);
            border-bottom: 1px solid var(--border);
        }

        .nav-logo {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            text-decoration: none;
        }

        .nav-logo svg {
            height: 120px;
            width: auto;
            display: block;
        }

        .nav-logo span {
            font-family: var(--heading-font);
            font-weight: 800;
            font-size: 1.15rem;
            color: var(--blue);
            letter-spacing: 0.01em;
        }

        .nav-right {
            display: flex;
            align-items: center;
            gap: 2rem;
        }

        .lang-toggle {
            display: flex;
            align-items: center;
            background: var(--dark3);
            border: 1px solid var(--border);
            border-radius: 20px;
            overflow: hidden;
            font-family: var(--heading-font);
            font-size: 0.72rem;
            font-weight: 700;
            letter-spacing: 0.08em;
        }

        .lang-btn {
            padding: 0.35rem 0.85rem;
            cursor: pointer;
            color: var(--muted);
            transition: background 0.2s, color 0.2s;
            user-select: none;
        }

        .lang-btn.active {
            background: var(--blue);
            color: var(--dark);
        }

        /* MAIN AREA */
        main {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 8rem 2rem 4rem;
            position: relative;
            overflow: hidden;
        }

        .bg-glow {
            position: absolute;
            inset: 0;
            background: radial-gradient(ellipse 60% 60% at 50% 50%, rgba(123, 189, 232, 0.06) 0%, transparent 70%), radial-gradient(ellipse 40% 40% at 20% 80%, rgba(200, 169, 110, 0.05) 0%, transparent 60%), var(--dark);
        }

        .bg-grid {
            position: absolute;
            inset: 0;
            background-image: linear-gradient(rgba(123, 189, 232, 0.04) 1px, transparent 1px), linear-gradient(90deg, rgba(123, 189, 232, 0.04) 1px, transparent 1px);
            background-size: 60px 60px;
            mask-image: radial-gradient(ellipse 70% 70% at 50% 50%, black 30%, transparent 80%);
            animation: gridDrift 20s linear infinite;
        }

        @keyframes gridDrift {
            0% {
                background-position: 0 0;
            }

            100% {
                background-position: 60px 60px;
            }
        }

        /* COMING SOON CARD */
        .card {
            position: relative;
            z-index: 1;
            background: var(--dark2);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 4rem 3.5rem;
            max-width: 520px;
            width: 100%;
            text-align: center;
            box-shadow: 0 24px 60px rgba(0, 0, 0, 0.35), 0 0 40px rgba(123, 189, 232, 0.06);
            animation: fadeUp 0.7s 0.2s ease both;
        }

        .card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 10%;
            right: 10%;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--blue), var(--gold), var(--blue), transparent);
            opacity: 0.6;
            border-radius: 50%;
        }

        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(24px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .card-eyebrow {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.72rem;
            font-weight: 600;
            letter-spacing: 0.18em;
            text-transform: uppercase;
            color: var(--gold);
            margin-bottom: 1.5rem;
        }

        .card-eyebrow::before {
            content: '';
            display: block;
            width: 20px;
            height: 1px;
            background: var(--gold);
        }

        .card-eyebrow::after {
            content: '';
            display: block;
            width: 20px;
            height: 1px;
            background: var(--gold);
        }

        .card h1 {
            font-family: var(--heading-font);
            font-weight: 800;
            font-size: clamp(2rem, 5vw, 2.8rem);
            line-height: 1.12;
            letter-spacing: -0.02em;
            color: var(--text);
            margin-bottom: 1.25rem;
        }

        .card h1 em {
            font-style: normal;
            color: var(--blue);
        }

        .card p {
            font-size: 0.98rem;
            color: var(--muted);
            line-height: 1.75;
            max-width: 380px;
            margin: 0 auto 2.5rem;
        }

        .card-dots {
            display: flex;
            justify-content: center;
            gap: 0.5rem;
        }

        .card-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--border);
            animation: pulse 1.8s ease-in-out infinite;
        }

        .card-dot:nth-child(1) {
            background: var(--blue);
            animation-delay: 0s;
        }

        .card-dot:nth-child(2) {
            background: rgba(123, 189, 232, 0.5);
            animation-delay: 0.3s;
        }

        .card-dot:nth-child(3) {
            background: rgba(123, 189, 232, 0.25);
            animation-delay: 0.6s;
        }

        @keyframes pulse {

            0%,
            100% {
                transform: scale(1);
                opacity: 0.6;
            }

            50% {
                transform: scale(1.4);
                opacity: 1;
            }
        }

        /* FOOTER */
        footer {
            background: var(--dark2);
            border-top: 1px solid var(--border);
            padding: 2.5rem 4rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 1rem;
            flex-wrap: wrap;
        }

        .footer-logo {
            display: flex;
            align-items: center;
            gap: 0.6rem;
        }

        .footer-logo svg {
            height:100px;
            display: block;
        }

        .footer-copy {
            font-size: 0.78rem;
            color: var(--muted);
        }

        .footer-links {
            display: flex;
            gap: 1.5rem;
            list-style: none;
        }

        .footer-links a {
            font-size: 0.78rem;
            color: var(--muted);
            text-decoration: none;
            transition: color 0.2s;
        }

        .footer-links a:hover {
            color: var(--blue);
        }

        @media (max-width: 768px) {
            nav {
                padding: 1rem 1.5rem;
            }

            .card {
                padding: 3rem 1.75rem;
            }

            footer {
                padding: 2rem 1.5rem;
                flex-direction: column;
                text-align: center;
            }
        }
    </style>
</head>

<body>

    <!-- NAV -->
    <nav>
        <a class="nav-logo" href="#">
            <?xml version="1.0" encoding="UTF-8"?>
            <svg viewBox="130 75 680 260" xmlns="http://www.w3.org/2000/svg">

                <defs>
                    <style>
                        @import url('https://fonts.googleapis.com/css2?family=Arvo:wght@700&amp;display=swap');
                        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@700&amp;display=swap');
                        @import url('https://fonts.googleapis.com/css2?family=Lexend+Mega:wght@700&amp;display=swap');
                        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@700&amp;display=swap');
                        @import url('https://fonts.googleapis.com/css2?family=Teko:wght@700&amp;display=swap');
                    </style>
                </defs>

                <!-- M — shifted left so gap from M to O ring matches gap from O ring to R -->
                <text x="145.6" y="175" font-family="'Lexend Mega'" font-weight="700" font-size="52" fill="#7bbde8">
                    M</text>
                <!-- RAVA -->
                <text x="240.7" y="175" font-family="'Lexend Mega'" font-weight="700" font-size="52" fill="#7bbde8">
                    RAVA</text>
                <!-- SOFT — tightened to match natural letter spacing -->
                <text x="415.7" y="175" font-family="'Lexend Mega'" font-weight="700" font-size="52" fill="#c8a96e">
                    SOFT</text>

                <!-- COMPASS ROSE — centered on O: x=221.4, y=156.3 -->
                <g transform="translate(221.4, 156.3)">
                    <!-- N spike -->
                    <polygon points="0,-72 3,-24 0,-15 -3,-24" fill="#7bbde8" />
                    <!-- S spike -->
                    <polygon points="0,72 -3,24 0,15 3,24" fill="none" stroke="#7bbde8" stroke-width="1.6"
                        opacity="0.55" />
                    <!-- E spike -->
                    <polygon points="72,0 24,3 15,0 24,-3" fill="none" stroke="#7bbde8" stroke-width="1.6"
                        opacity="0.55" />
                    <!-- W spike -->
                    <polygon points="-72,0 -24,-3 -15,0 -24,3" fill="none" stroke="#7bbde8" stroke-width="1.6"
                        opacity="0.55" />
                    <!-- Diagonal gold ticks -->
                    <g stroke="#c8a96e" stroke-width="1.6" opacity="0.85" stroke-linecap="round">
                        <line x1="28" y1="-28" x2="38" y2="-38" />
                        <line x1="-28" y1="-28" x2="-38" y2="-38" />
                        <line x1="28" y1="28" x2="38" y2="38" />
                        <line x1="-28" y1="28" x2="-38" y2="38" />
                    </g>
                    <!-- O ring — sized to match letter cap-height -->
                    <circle r="13" fill="none" stroke="#7bbde8" stroke-width="8" />
                    <!-- Center dot -->
                    <circle r="3" fill="#c8a96e" />
                </g>

            </svg>
        </a>
        <div class="nav-right">
            <div class="lang-toggle">
                <div class="lang-btn active" data-lang="en" onclick="setLang('en')">EN</div>
                <div class="lang-btn" data-lang="cs" onclick="setLang('cs')">CS</div>
            </div>
        </div>
    </nav>

    <!-- MAIN -->
    <main>
        <div class="bg-glow"></div>
        <div class="bg-grid"></div>
        <div class="card">
            <div class="card-eyebrow" id="card-eyebrow">Custom Software Development</div>
            <h1 id="card-h1">Our new website is <em>coming soon.</em></h1>
            <p id="card-p">We build custom software solutions tailored to your business. In the meantime, reach out
                directly — we'd love to hear about your project.</p>
            <div class="card-dots">
                <div class="card-dot"></div>
                <div class="card-dot"></div>
                <div class="card-dot"></div>
            </div>
        </div>
    </main>

    <!-- FOOTER -->
    <footer>
        <div class="footer-logo">
            <?xml version="1.0" encoding="UTF-8"?>
            <svg viewBox="130 75 680 260" xmlns="http://www.w3.org/2000/svg">

                <defs>
                    <style>
                        @import url('https://fonts.googleapis.com/css2?family=Arvo:wght@700&amp;display=swap');
                        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@700&amp;display=swap');
                        @import url('https://fonts.googleapis.com/css2?family=Lexend+Mega:wght@700&amp;display=swap');
                        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@700&amp;display=swap');
                        @import url('https://fonts.googleapis.com/css2?family=Teko:wght@700&amp;display=swap');
                    </style>
                </defs>

                <!-- M — shifted left so gap from M to O ring matches gap from O ring to R -->
                <text x="145.6" y="175" font-family="'Lexend Mega'" font-weight="700" font-size="52" fill="#7bbde8">
                    M</text>
                <!-- RAVA -->
                <text x="240.7" y="175" font-family="'Lexend Mega'" font-weight="700" font-size="52" fill="#7bbde8">
                    RAVA</text>
                <!-- SOFT — tightened to match natural letter spacing -->
                <text x="415.7" y="175" font-family="'Lexend Mega'" font-weight="700" font-size="52" fill="#c8a96e">
                    SOFT</text>

                <!-- COMPASS ROSE — centered on O: x=221.4, y=156.3 -->
                <g transform="translate(221.4, 156.3)">
                    <!-- N spike -->
                    <polygon points="0,-72 3,-24 0,-15 -3,-24" fill="#7bbde8" />
                    <!-- S spike -->
                    <polygon points="0,72 -3,24 0,15 3,24" fill="none" stroke="#7bbde8" stroke-width="1.6"
                        opacity="0.55" />
                    <!-- E spike -->
                    <polygon points="72,0 24,3 15,0 24,-3" fill="none" stroke="#7bbde8" stroke-width="1.6"
                        opacity="0.55" />
                    <!-- W spike -->
                    <polygon points="-72,0 -24,-3 -15,0 -24,3" fill="none" stroke="#7bbde8" stroke-width="1.6"
                        opacity="0.55" />
                    <!-- Diagonal gold ticks -->
                    <g stroke="#c8a96e" stroke-width="1.6" opacity="0.85" stroke-linecap="round">
                        <line x1="28" y1="-28" x2="38" y2="-38" />
                        <line x1="-28" y1="-28" x2="-38" y2="-38" />
                        <line x1="28" y1="28" x2="38" y2="38" />
                        <line x1="-28" y1="28" x2="-38" y2="38" />
                    </g>
                    <!-- O ring — sized to match letter cap-height -->
                    <circle r="13" fill="none" stroke="#7bbde8" stroke-width="8" />
                    <!-- Center dot -->
                    <circle r="3" fill="#c8a96e" />
                </g>

            </svg>
        </div>
        <p class="footer-copy" id="footer-copy">2026 MoravaSoft · Morava, Czech Republic</p>
        <ul class="footer-links">
            <li><a href="mailto:info@moravasoft.com">info@moravasoft.com</a></li>
        </ul>
    </footer>

    <script>
        var T = {
            en: {
                eyebrow: "Custom Software Development",
                h1: "Our new website is <em>coming soon.</em>",
                p: "We build custom software solutions tailored to your business. In the meantime, reach out directly — we'd love to hear about your project.",
                footerCopy: "2026 MoravaSoft · Morava, Czech Republic"
            },
            cs: {
                eyebrow: "Vývoj softwaru na míru",
                h1: "Nový web brzy <em>přichází.</em>",
                p: "Vyvíjíme softwarová řešení šitá na míru vašemu podnikání. Neváhejte nás mezitím kontaktovat — rádi si o vašem projektu popovídáme.",
                footerCopy: "2026 MoravaSoft · Morava, Česká republika"
            }
        };

        function setLang(l) {
            var t = T[l];
            document.documentElement.lang = l;
            var eyebrow = document.getElementById('card-eyebrow');
            var h1 = document.getElementById('card-h1');
            var p = document.getElementById('card-p');
            var fc = document.getElementById('footer-copy');
            if (eyebrow) eyebrow.textContent = t.eyebrow;
            if (h1) h1.innerHTML = t.h1;
            if (p) p.textContent = t.p;
            if (fc) fc.textContent = t.footerCopy;
            document.querySelectorAll('.lang-btn').forEach(function (b) {
                b.classList.toggle('active', b.dataset.lang === l);
            });
        }

        document.addEventListener('DOMContentLoaded', function () {
            setLang('en');
        });
    </script>

</body>

</html>

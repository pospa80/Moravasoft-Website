<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MoravaSoft – Custom Software Development</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --blue: #7bbde8;
            --blue-dim: rgba(123, 189, 232, 0.15);
            --gold: #c8a96e;
            --dark: #111827;
            --dark2: #1a2330;
            --dark3: #1f2d3d;
            --dark4: #263548;
            --text: #e8edf4;
            --muted: #9aa6b2;
            --border: rgba(123, 189, 232, 0.15);
            --border-gold: rgba(200, 169, 110, 0.25);
            --heading-font: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', Arial, sans-serif;
            --body-font: 'DM Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        }

        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: var(--body-font);
            background: var(--dark);
            color: var(--text);
            line-height: 1.7;
            overflow-x: hidden;
        }

        /* NAV */
        nav {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 1rem 4rem;
            background: rgba(13, 17, 23, 0.9);
            backdrop-filter: blur(16px);
            border-bottom: 1px solid var(--border);
        }

        .nav-logo {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            text-decoration: none;
        }

        .nav-logo img {
            height: 80px;
            width: auto;
            display: block;
        }

        .nav-logo span {
            font-family: var(--heading-font);
            font-weight: 800;
            font-size: 1.15rem;
            color: var(--blue);
            letter-spacing: 0.01em;
        }

        .nav-right {
            display: flex;
            align-items: center;
            gap: 2rem;
        }

        .lang-toggle {
            display: flex;
            align-items: center;
            background: var(--dark3);
            border: 1px solid var(--border);
            border-radius: 20px;
            overflow: hidden;
            font-family: var(--heading-font);
            font-size: 0.72rem;
            font-weight: 700;
            letter-spacing: 0.08em;
        }

        .lang-btn {
            padding: 0.35rem 0.85rem;
            cursor: pointer;
            color: var(--muted);
            transition: background 0.2s, color 0.2s;
            user-select: none;
        }

        .lang-btn.active {
            background: var(--blue);
            color: var(--dark);
        }

        /* MAIN AREA */
        main {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 8rem 2rem 4rem;
            position: relative;
            overflow: hidden;
        }

        .bg-glow {
            position: absolute;
            inset: 0;
            background: radial-gradient(ellipse 60% 60% at 50% 50%, rgba(123, 189, 232, 0.06) 0%, transparent 70%), radial-gradient(ellipse 40% 40% at 20% 80%, rgba(200, 169, 110, 0.05) 0%, transparent 60%), var(--dark);
        }

        .bg-grid {
            position: absolute;
            inset: 0;
            background-image: linear-gradient(rgba(123, 189, 232, 0.04) 1px, transparent 1px), linear-gradient(90deg, rgba(123, 189, 232, 0.04) 1px, transparent 1px);
            background-size: 60px 60px;
            mask-image: radial-gradient(ellipse 70% 70% at 50% 50%, black 30%, transparent 80%);
            animation: gridDrift 20s linear infinite;
        }

        @keyframes gridDrift {
            0% {
                background-position: 0 0;
            }

            100% {
                background-position: 60px 60px;
            }
        }

        /* COMING SOON CARD */
        .card {
            position: relative;
            z-index: 1;
            background: var(--dark2);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 4rem 3.5rem;
            max-width: 520px;
            width: 100%;
            text-align: center;
            box-shadow: 0 24px 60px rgba(0, 0, 0, 0.35), 0 0 40px rgba(123, 189, 232, 0.06);
            animation: fadeUp 0.7s 0.2s ease both;
        }

        .card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 10%;
            right: 10%;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--blue), var(--gold), var(--blue), transparent);
            opacity: 0.6;
            border-radius: 50%;
        }

        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(24px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .card-eyebrow {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.72rem;
            font-weight: 600;
            letter-spacing: 0.18em;
            text-transform: uppercase;
            color: var(--gold);
            margin-bottom: 1.5rem;
        }

        .card-eyebrow::before {
            content: '';
            display: block;
            width: 20px;
            height: 1px;
            background: var(--gold);
        }

        .card-eyebrow::after {
            content: '';
            display: block;
            width: 20px;
            height: 1px;
            background: var(--gold);
        }

        .card h1 {
            font-family: var(--heading-font);
            font-weight: 800;
            font-size: clamp(2rem, 5vw, 2.8rem);
            line-height: 1.12;
            letter-spacing: -0.02em;
            color: var(--text);
            margin-bottom: 1.25rem;
        }

        .card h1 em {
            font-style: normal;
            color: var(--blue);
        }

        .card p {
            font-size: 0.98rem;
            color: var(--muted);
            line-height: 1.75;
            max-width: 380px;
            margin: 0 auto 2.5rem;
        }

        .card-dots {
            display: flex;
            justify-content: center;
            gap: 0.5rem;
        }

        .card-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--border);
            animation: pulse 1.8s ease-in-out infinite;
        }

        .card-dot:nth-child(1) {
            background: var(--blue);
            animation-delay: 0s;
        }

        .card-dot:nth-child(2) {
            background: rgba(123, 189, 232, 0.5);
            animation-delay: 0.3s;
        }

        .card-dot:nth-child(3) {
            background: rgba(123, 189, 232, 0.25);
            animation-delay: 0.6s;
        }

        @keyframes pulse {

            0%,
            100% {
                transform: scale(1);
                opacity: 0.6;
            }

            50% {
                transform: scale(1.4);
                opacity: 1;
            }
        }

        /* FOOTER */
        footer {
            background: var(--dark2);
            border-top: 1px solid var(--border);
            padding: 2.5rem 4rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 1rem;
            flex-wrap: wrap;
        }

        .footer-logo {
            display: flex;
            align-items: center;
            gap: 0.6rem;
        }

        .footer-logo img {
            height: 60px;
            display: block;
        }

        .footer-copy {
            font-size: 0.78rem;
            color: var(--muted);
        }

        .footer-links {
            display: flex;
            gap: 1.5rem;
            list-style: none;
        }

        .footer-links a {
            font-size: 0.78rem;
            color: var(--muted);
            text-decoration: none;
            transition: color 0.2s;
        }

        .footer-links a:hover {
            color: var(--blue);
        }

        @media (max-width: 768px) {
            nav {
                padding: 1rem 1.5rem;
                flex-direction: column;
                align-items: center;
                gap: 0.6rem;
            }

            .card {
                padding: 3rem 1.75rem;
            }

            footer {
                padding: 2rem 1.5rem;
                flex-direction: column;
                align-items: center;
                text-align: center;
            }
        }
    </style>
</head>

            if (h1) h1.innerHTML = t.h1;
            if (p) p.textContent = t.p;
            if (fc) fc.textContent = t.footerCopy;
            document.querySelectorAll('.lang-btn').forEach(function (b) {
                b.classList.toggle('active', b.dataset.lang === l);
            });
        }

        document.addEventListener('DOMContentLoaded', function () {
            setLang('en');
        });
    </script>

</body>

</html>
